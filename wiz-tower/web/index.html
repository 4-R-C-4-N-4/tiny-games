<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>wiz-tower</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='13'%3E%F0%9F%A7%99%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --void:#07070f; --panel:#12132a; --panel2:#191a35; --line:#2a2b52; --edge:#3a3b6a;
      --ink:#ece9ff; --dim:#8b86bf; --gold:#ffe14d; --danger:#ff5a4d;
      --display:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
      --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
      --mono:ui-monospace,"SF Mono",Menlo,monospace;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { overflow-x:hidden; }
    body {
      margin:0; color:var(--ink); font:14px/1.45 var(--sans);
      background:
        radial-gradient(120% 80% at 50% -10%, #17183a 0%, #0b0b1c 40%, var(--void) 100%);
      background-color:var(--void);
      min-height:100vh;
    }
    .wt { max-width:360px; margin:0 auto; padding:12px 12px 24px; display:flex; flex-direction:column; gap:10px;
          animation:rise .5s ease both; }
    @keyframes rise { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

    /* --- masthead --- */
    .wt-top { display:flex; align-items:center; gap:10px; }
    .wt-mark { width:42px; height:44px; filter:drop-shadow(0 0 8px rgba(150,120,255,.35)); }
    .wt-brand { display:flex; flex-direction:column; line-height:1; margin-right:auto; }
    .wt-title { font-family:var(--display); font-weight:700; font-size:23px; letter-spacing:2px;
      background:linear-gradient(92deg,#d9c9ff,#fff2c4 60%,#ffcaa0);
      -webkit-background-clip:text; background-clip:text; color:transparent; }
    .wt-title i { color:var(--gold); font-style:normal; -webkit-text-fill-color:var(--gold); }
    .wt-sub { font-size:9.5px; letter-spacing:3.5px; text-transform:uppercase; color:var(--dim); margin-top:3px; }
    .wt-codexbtn { width:34px; height:34px; border-radius:50%; border:1px solid var(--edge);
      background:var(--panel); color:var(--gold); font-size:15px; cursor:pointer; transition:.15s; }
    .wt-codexbtn:hover { border-color:var(--gold); box-shadow:0 0 12px rgba(255,225,77,.3); }

    /* --- setup chips --- */
    .wt-setup { display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
    .wt-lbl { color:var(--dim); font-size:9.5px; text-transform:uppercase; letter-spacing:1.5px; margin:0 2px 0 6px; }
    .wt-chip { background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:7px;
      padding:3px 7px; font-size:12px; cursor:pointer; transition:.12s; }
    .wt-chip:hover { border-color:var(--gold); color:#fff; }

    /* --- HUD --- */
    .wt-hud { display:flex; align-items:center; gap:12px; background:linear-gradient(180deg,var(--panel2),var(--panel));
      border:1px solid var(--line); border-radius:12px; padding:8px 12px; box-shadow:inset 0 1px 0 rgba(255,255,255,.04); }
    .wt-cur { font-family:var(--mono); font-weight:600; font-size:15px; white-space:nowrap; }
    .wt-cur b { color:#8fd0ff; font-weight:400; }
    .wt-wave { color:var(--dim); font-size:11px; margin-left:auto; white-space:nowrap; }
    .wt-core { position:relative; flex:1; height:18px; min-width:90px; border-radius:9px;
      background:#05050d; border:1px solid var(--line); overflow:hidden; }
    .wt-corefill { position:absolute; inset:0 auto 0 0; width:100%; border-radius:9px; transition:width .15s linear;
      box-shadow:0 0 12px rgba(124,255,178,.5); }
    .wt-core span { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      font:10px var(--mono); color:#04120b; font-weight:700; text-shadow:0 1px 0 rgba(255,255,255,.2); }

    /* --- board --- */
    .wt-board-wrap { position:relative; align-self:center; border-radius:12px;
      box-shadow:0 0 0 1px var(--line), 0 0 34px rgba(90,80,180,.22); }
    canvas { display:block; border-radius:12px; background:var(--void); touch-action:none; }
    .wt-overlay,.wt-codex { position:absolute; inset:0; display:none; align-items:center; justify-content:center;
      border-radius:12px; background:rgba(6,6,15,.86); backdrop-filter:blur(3px); }
    .wt-go { text-align:center; padding:20px; animation:rise .4s ease both; }
    .wt-go h2 { margin:0 0 6px; font-family:var(--display); color:var(--danger); font-size:22px; text-shadow:0 0 18px rgba(255,90,77,.5); }
    .wt-go p { color:var(--dim); margin:0 0 14px; }
    .wt-codex-in { text-align:center; padding:14px; max-width:300px; }
    .wt-codex-in img { width:210px; height:auto; }
    .wt-codex-in p { color:var(--dim); font-size:12px; line-height:1.6; margin:6px 0 12px; }
    .wt-codex-in b { color:var(--ink); }

    /* --- telegraph / scrying --- */
    .wt-telegraph { min-height:34px; font-size:11.5px; color:#d7cffa; background:var(--panel);
      border:1px solid var(--line); border-radius:10px; padding:7px 10px; }
    .wt-telegraph b { color:var(--gold); }
    .wt-telegraph em { color:var(--dim); font-style:normal; }
    .wt-scry { color:var(--gold); border-color:transparent;
      background:linear-gradient(var(--panel),var(--panel)) padding-box,
                 linear-gradient(100deg,#6a4bd6,#c9a24b,#6a4bd6) border-box;
      background-size:100% 100%, 220% 100%; border:1px solid transparent;
      animation:scry 3s linear infinite; }
    @keyframes scry { to { background-position:0 0, 220% 0; } }

    /* --- palette (sigil-stones) --- */
    .wt-palette { display:flex; flex-wrap:wrap; gap:5px; }
    .wt-tool { --el:var(--edge); background:var(--panel); color:var(--ink);
      border:1px solid var(--line); border-radius:9px; padding:6px 8px; font-size:16px; cursor:pointer;
      min-width:42px; display:flex; flex-direction:column; align-items:center; gap:1px; transition:.12s; }
    .wt-tool small { font-size:8.5px; color:var(--dim); font-family:var(--mono); text-transform:uppercase; letter-spacing:.5px; }
    .wt-tool:disabled { opacity:.32; cursor:default; }
    .wt-elem { border-color:color-mix(in srgb, var(--el) 45%, var(--line)); }
    .wt-elem:not(:disabled):hover { box-shadow:0 0 10px -1px var(--el); }
    .wt-tool.sel { border-color:var(--el); box-shadow:0 0 0 1px var(--el), 0 0 12px -2px var(--el); }
    .wt-tier { font-size:13px; font-weight:700; }

    /* --- controls --- */
    .wt-controls { display:flex; gap:6px; align-items:stretch; }
    .wt-ctl { flex:1; background:var(--panel2); color:var(--ink); border:1px solid var(--line);
      border-radius:10px; padding:11px 8px; font-size:14px; cursor:pointer; transition:.12s; }
    .wt-ctl:hover { filter:brightness(1.15); border-color:var(--edge); }
    .wt-ctl.sel { border-color:var(--gold); color:#fff; box-shadow:inset 0 0 12px -4px var(--gold); }
    .wt-primary { flex:2; background:linear-gradient(180deg,#ffe887,#f4b83a); color:#2a1e02; font-weight:800;
      letter-spacing:.5px; border:none; box-shadow:0 4px 18px -6px rgba(244,184,58,.7); animation:breathe 2.6s ease-in-out infinite; }
    @keyframes breathe { 50% { box-shadow:0 4px 26px -4px rgba(244,184,58,.95); } }
    .wt-verb { --el:var(--gold); flex:0 0 auto; min-width:40px; font-size:15px; }
    .wt-verb.sel { border-color:var(--el); box-shadow:0 0 0 1px var(--el), 0 0 12px -2px var(--el); }
    .wt-charges { align-self:center; color:var(--dim); font:11px var(--mono); padding:0 2px; }

    @media (prefers-reduced-motion: reduce) { * { animation:none !important; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
