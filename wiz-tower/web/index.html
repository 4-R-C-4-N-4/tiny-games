<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>wiz-tower</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='13'%3E%F0%9F%A7%99%3C/text%3E%3C/svg%3E" />
  <style>
    :root { --bg:#0b0c1c; --panel:#14152b; --ink:#e7e7f2; --dim:#9a9ab5; --line:#2a2b48; --gold:#ffd23f; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; background:var(--bg); color:var(--ink); font:14px/1.4 ui-sans-serif, system-ui, sans-serif; }
    .wt { max-width: 340px; margin: 0 auto; padding: 10px; display:flex; flex-direction:column; gap:8px; }
    .wt-top { display:flex; align-items:baseline; justify-content:space-between; }
    .wt-title { font-size:18px; font-weight:700; }
    .wt-sub { color:var(--dim); font-size:11px; }
    .wt-setup { display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
    .wt-lbl { color:var(--dim); font-size:11px; margin-left:4px; }
    .wt-chip { background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:6px; padding:3px 7px; font-size:13px; cursor:pointer; }
    .wt-chip:hover { border-color:var(--gold); }
    .wt-hud { display:flex; align-items:center; gap:10px; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:7px 10px; }
    .wt-cur { font-variant-numeric: tabular-nums; font-weight:600; }
    .wt-wave { color:var(--dim); font-size:12px; margin-left:auto; }
    .wt-core { position:relative; flex:1; height:16px; background:#000a; border-radius:8px; overflow:hidden; min-width:80px; }
    .wt-corefill { position:absolute; inset:0 auto 0 0; width:100%; background:#7CFFB2; transition:width .1s linear; }
    .wt-core span { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:10px; color:#0b0c1c; font-weight:700; }
    .wt-board-wrap { position:relative; align-self:center; }
    canvas { display:block; border:1px solid var(--line); border-radius:8px; background:#0d0e22; touch-action:none; }
    .wt-overlay { position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:#0b0c1cd0; border-radius:8px; }
    .wt-go { text-align:center; }
    .wt-go h2 { margin:0 0 6px; color:#ff5a4d; }
    .wt-telegraph { min-height:20px; font-size:12px; color:var(--gold); background:#1a1730; border:1px solid var(--line); border-radius:8px; padding:6px 9px; }
    .wt-telegraph em { color:var(--dim); font-style:normal; }
    .wt-palette { display:flex; flex-wrap:wrap; gap:5px; }
    .wt-tool { background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:6px 8px; font-size:15px; cursor:pointer; min-width:40px; display:flex; flex-direction:column; align-items:center; gap:1px; }
    .wt-tool small { font-size:9px; color:var(--dim); font-variant-numeric:tabular-nums; }
    .wt-tool:disabled { opacity:.35; cursor:default; }
    .wt-tool.sel { border-color:var(--gold); box-shadow:0 0 0 1px var(--gold) inset; }
    .wt-tier { font-size:12px; font-weight:700; }
    .wt-controls { display:flex; gap:6px; }
    .wt-ctl { flex:1; background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:9px; font-size:14px; cursor:pointer; }
    .wt-ctl.sel { border-color:var(--gold); }
    .wt-verb { flex:0 0 auto; min-width:38px; }
    .wt-verb:disabled { opacity:.3; }
    .wt-charges { align-self:center; color:var(--dim); font-size:12px; padding:0 2px; }
    .wt-primary { background:var(--gold); color:#0b0c1c; font-weight:700; border-color:var(--gold); }
    .wt-ctl:hover { filter:brightness(1.1); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
