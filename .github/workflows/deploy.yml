name: Deploy wiz-tower to Pages

on:
  push:
    branches: [main]
    paths: ['wiz-tower/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wiz-tower
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: wiz-tower/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      # `single` runs vite build + inlines everything into dist/wiz-tower.html
      # (self-contained), alongside the normal dist/index.html PWA build.
      - run: npm run single
      - uses: actions/upload-pages-artifact@v3
        with:
          path: wiz-tower/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
