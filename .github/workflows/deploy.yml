name: Deploy games to Pages

on:
  push:
    branches: [main]
    paths: ['wiz-tower/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      # ── Build each game into _site/<game>/ ─────────────────────────────
      # Every game deploys side-by-side under its own path, so they never
      # collide. To add a game: copy this block, change the dir name, and give
      # the game a game.json (name/rune/tagline/note) — it feeds games.json.
      # `single` emits dist/<game>.html (self-contained) + dist/index.html (PWA).
      - run: npm ci
        working-directory: wiz-tower
      - run: npm run typecheck
        working-directory: wiz-tower
      - run: npm run single
        working-directory: wiz-tower
      - run: mkdir -p _site/wiz-tower && cp -r wiz-tower/dist/. _site/wiz-tower/ && cp wiz-tower/game.json _site/wiz-tower/game.json
      # ───────────────────────────────────────────────────────────────────

      # games.json — machine-readable manifest built from each game's game.json,
      # so consumers (e.g. the ARCANA site) render the game list with zero edits.
      - name: Games manifest
        run: |
          : > /tmp/games.ndjson
          for meta in _site/*/game.json; do
            [ -f "$meta" ] || continue
            slug=$(basename "$(dirname "$meta")")
            jq -c --arg slug "$slug" \
              '{slug:$slug, file:(.file // ($slug+".html")), name, rune, tagline, note}' \
              "$meta" >> /tmp/games.ndjson
          done
          jq -s '.' /tmp/games.ndjson > _site/games.json
          cat _site/games.json

      # Auto-generated landing page listing whatever games are in _site/.
      - name: Games index
        run: |
          exec > _site/index.html
          echo '<!doctype html><meta charset="utf-8"><title>tiny-games</title>'
          echo '<meta name="viewport" content="width=device-width,initial-scale=1">'
          echo '<body style="font:16px/1.6 system-ui,sans-serif;background:#0a0a0f;color:#e9e3d4;padding:3rem 1.5rem">'
          echo '<main style="max-width:34rem;margin:auto"><h1 style="font-weight:400">tiny-games</h1>'
          echo '<p style="color:#a8a08d">Small games, each with a tiny client-side adversary.</p>'
          for d in _site/*/; do g=$(basename "$d");
            printf '<p><a href="%s/" style="color:#c4a35a;font-size:1.3rem;text-decoration:none">%s &rsaquo;</a></p>\n' "$g" "$g"; done
          echo '<p><a href="https://github.com/4-R-C-4-N-4/tiny-games" style="color:#6d6857">source on GitHub</a></p></main>'

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
